spring:
  application:
    name: p2p-payment-ledger

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/p2p_ledger}
    username: ${DB_USERNAME:p2p_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": false
        jdbc:
          lob:
            "[non_contextual_creation]": true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        "[enable.idempotence]": true
        "[max.in.flight.requests.per.connection]": 1
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:p2p-payment-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.p2p.payment.dto"

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    "[com.p2p.payment]": ${LOG_LEVEL:INFO}
    "[org.springframework.security]": WARN
    "[org.hibernate.SQL]": WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  idempotency:
    ttl-hours: ${IDEMPOTENCY_TTL_HOURS:24}
  rate-limit:
    transfers-per-minute: ${RATE_LIMIT_TRANSFERS_PER_MINUTE:10}
  kafka:
    topics:
      transfer-completed: transfer-completed
      transfer-reversed:  transfer-reversed
      deposit-confirmed:  deposit-confirmed
      login-new-ip:       login-new-ip
      password-changed:   password-changed
      large-withdrawal:   large-withdrawal
      monthly-statement:  monthly-statement
      tos-update:         tos-update
  notifications:
    sendgrid:
      api-key:    ${SENDGRID_API_KEY}
      from-email: ${SENDGRID_FROM_EMAIL}
      from-name:  ${SENDGRID_FROM_NAME:P2P Payments}
    firebase:
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:firebase-service-account.json}
    large-withdrawal-threshold: ${LARGE_WITHDRAWAL_THRESHOLD:1000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized