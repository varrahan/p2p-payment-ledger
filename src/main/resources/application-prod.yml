spring:
  application:
    name: p2p-payment-ledger

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50 
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: P2PLedgerHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[show_sql]": false
        "[format_sql]": false
        "[jdbc.batch_size]": 25
        "[order_inserts]": true
        "[order_updates]": true
    open-in-view: false

  flyway:
    enabled: true
    clean-disabled: true 
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl: 
        enabled: true
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 8

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      acks: all
      retries: 5
      properties:
        "[enable.idempotence]": true
        "[compression.type]": snapppy
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:p2p-ledger-prod-group}
      auto-offset-reset: earliest
      properties:
        "[spring.json.trusted.packages]": "com.p2p.payment.dto"

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: native
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    root: INFO
    "[com.p2p.payment]": INFO
    "[org.springframework.web]": WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  idempotency:
    ttl-hours: ${IDEMPOTENCY_TTL_HOURS:24}
  notifications:
    sendgrid:
      api-key: ${SENDGRID_API_KEY}